    clearAllHintHighlights() {
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('hint-region-row', 'hint-region-col', 'hint-region-block', 'hint-excluded', 'hint-target', 'conflict-highlight'));
    }

    applyStepHighlights(highlights) {
        this.clearAllHintHighlights(); if (!highlights) return;
        highlights.forEach(h => {
            if (h.allRow) for (let j = 0; j < 9; j++) document.getElementById(`cell-${h.r}-${j}`)?.classList.add(h.class);
            if (h.allCol) for (let i = 0; i < 9; i++) document.getElementById(`cell-${i}-${h.c}`)?.classList.add(h.class);
            if (h.allBlock) for (let i = h.sr; i < h.sr + 3; i++) for (let j = h.sc; j < h.sc + 3; j++) document.getElementById(`cell-${i}-${j}`)?.classList.add(h.class);
            if (h.excludedCells) h.excludedCells.forEach(({ r, c }) => document.getElementById(`cell-${r}-${c}`)?.classList.add(h.class));
            if (h.target) document.getElementById(`cell-${h.r}-${h.c}`)?.classList.add(h.class);
        });
    }

    goToStep(idx) {
        if (!this.currentHintSteps || idx < 0 || idx >= this.currentHintSteps.length) return;
        this.currentHintStepIndex = idx; const step = this.currentHintSteps[idx];
        this.applyStepHighlights(step.highlights);
        document.getElementById('hintStepIndicator').textContent = step.indicator;
        document.getElementById('hintDescEl').innerHTML = step.text;
        document.getElementById('prevStepBtn').disabled = idx === 0;
        document.getElementById('nextStepBtn').disabled = idx === this.currentHintSteps.length - 1;
    }

    checkBlockInteraction() { return this.isHintModalOpen; }

        _getDetailedSteps(hint) {
        const { type } = hint;
        
        // 唯余数和隐性唯一已在规则类中自带详细步骤，直接使用它们
        if (type === 'NakedSingle' || type === 'HiddenSingleRow' || type === 'HiddenSingleCol' || type === 'HiddenSingleBlock') {
            const ruleSteps = hint.rule.getSteps(hint);
            if (ruleSteps && ruleSteps.length > 0) return ruleSteps;
        }
        
        // 其他所有技巧使用下面的详细配置
        const configs = {
            // ===== 基础技巧 =====
            PointingRow: () => [
                { indicator: '步骤1/4', text: `先观察这个九宫格（紫色高亮）。数字 ${hint.val} 在这个宫里能填的位置只有这几个黄色格子。这说明 ${hint.val} 被"锁"在了这一行。`, highlights: [{ allBlock: true, sr: hint.blockSr, sc: hint.blockSc, class: 'hint-region-block' }, ...hint.cells.map(cell => ({ target: true, r: cell.r, c: cell.c, class: 'hint-target' }))] },
                { indicator: '步骤2/4', text: `现在我们放大到整个第 ${hint.r+1} 行（蓝色高亮）。看看这一行里还有哪些空格可能填 ${hint.val}？`, highlights: [{ allRow: true, r: hint.r, class: 'hint-region-row' }] },
                { indicator: '步骤3/4', text: `但我们已经知道，${hint.val} 在这个宫里必须填在第 ${hint.r+1} 行的那几个黄色格子里。所以这一行里，宫外的其他位置（红色高亮）就绝不能再填 ${hint.val} 了。`, highlights: [...hint.cells.map(cell => ({ target: true, r: cell.r, c: cell.c, class: 'hint-target' })), ...hint.eliminations.map(e => ({ target: true, r: e.r, c: e.c, class: 'conflict-highlight' }))] },
                { indicator: '步骤4/4', text: `结论：这些红色高亮格子的候选数 ${hint.val} 可以安全排除。`, highlights: hint.eliminations.map(e => ({ target: true, r: e.r, c: e.c, class: 'conflict-highlight' })) }
            ],
            PointingCol: () => [
                { indicator: '步骤1/4', text: `先观察这个九宫格（紫色高亮）。数字 ${hint.val} 在这个宫里能填的位置只有这几个黄色格子。这说明 ${hint.val} 被"锁"在了这一列。`, highlights: [{ allBlock: true, sr: hint.blockSr, sc: hint.blockSc, class: 'hint-region-block' }, ...hint.cells.map(cell => ({ target: true, r: cell.r, c: cell.c, class: 'hint-target' }))] },
                { indicator: '步骤2/4', text: `现在我们放大到整个第 ${hint.c+1} 列（绿色高亮）。看看这一列里还有哪些空格可能填 ${hint.val}？`, highlights: [{ allCol: true, c: hint.c, class: 'hint-region-col' }] },
                { indicator: '步骤3/4', text: `但我们已经知道，${hint.val} 在这个宫里必须填在第 ${hint.c+1} 列的那几个黄色格子里。所以这一列里，宫外的其他位置（红色高亮）就绝不能再填 ${hint.val} 了。`, highlights: [...hint.cells.map(cell => ({ target: true, r: cell.r, c: cell.c, class: 'hint-target' })), ...hint.eliminations.map(e => ({ target: true, r: e.r, c: e.c, class: 'conflict-highlight' }))] },
                { indicator: '步骤4/4', text: `结论：这些红色高亮格子的候选数 ${hint.val} 可以安全排除。`, highlights: hint.eliminations.map(e => ({ target: true, r: e.r, c: e.c, class: 'conflict-highlight' })) }
            ],
            NakedPair: () => [
                { indicator: '步骤1/4', text: `先看这个${hint.regionName}。我找到了两个很特别的黄色格子，它们都只能填 ${hint.vals[0]} 或 ${hint.vals[1]}。就像这两个数字被它们"垄断"了。`, highlights: hint.cells.map(cell => ({ target: true, r: cell.r, c: cell.c, class: 'hint-target' })) },
                { indicator: '步骤2/4', text: `想想看，这两个格子一定会填 ${hint.vals[0]} 或 ${hint.vals[1]}，不管怎么填，这两个数字都不会跑到这个${hint.regionName}的其他地方去。`, highlights: hint.cells.map(cell => ({ target: true, r: cell.r, c: cell.c, class: 'hint-target' })) },
                { indicator: '步骤3/4', text: `所以，同一${hint.regionName}里的其他空格（红色高亮）就可以放心地删掉 ${hint.vals[0]} 和 ${hint.vals[1]} 了。`, highlights: [...hint.cells.map(cell => ({ target: true, r: cell.r, c: cell.c, class: 'hint-target' })), ...hint.eliminations.map(e => ({ target: true, r: e.r, c: e.c, class: 'conflict-highlight' }))] },
                { indicator: '步骤4/4', text: `结论：红色高亮格子的候选数 ${hint.vals[0]} 和 ${hint.vals[1]} 可以安全排除。`, highlights: hint.eliminations.map(e => ({ target: true, r: e.r, c: e.c, class: 'conflict-highlight' })) }
            ],

    initTooltips() {
        const tooltip = document.getElementById('customTooltip');
        if (!tooltip) return;
        let tooltipTimeout = null;
        const showTooltip = (text, x, y) => {
            tooltip.textContent = text;
            tooltip.style.left = (x + 15) + 'px';
            tooltip.style.top = (y - 40) + 'px';
            tooltip.classList.add('show');
        };
        const hideTooltip = () => tooltip.classList.remove('show');
        const handleMouseEnter = (e) => {
            const el = e.currentTarget;
            const text = el.getAttribute('data-tooltip');
            if (!text) return;
            tooltipTimeout = setTimeout(() => showTooltip(text, e.clientX, e.clientY), 600);
        };
        const handleMouseLeave = () => { clearTimeout(tooltipTimeout); hideTooltip(); };
        const handleTouchStart = (e) => {
            const el = e.currentTarget;
            const text = el.getAttribute('data-tooltip');
            if (!text) return;
            tooltipTimeout = setTimeout(() => { const touch = e.touches[0]; showTooltip(text, touch.clientX, touch.clientY); }, 600);
        };
        const handleTouchEnd = () => { clearTimeout(tooltipTimeout); setTimeout(() => hideTooltip(), 1000); };
        const elements = document.querySelectorAll('[data-tooltip]');
        elements.forEach(el => {
            el.addEventListener('mouseenter', handleMouseEnter);
            el.addEventListener('mouseleave', handleMouseLeave);
            el.addEventListener('touchstart', handleTouchStart, { passive: true });
            el.addEventListener('touchend', handleTouchEnd);
            el.addEventListener('touchcancel', handleTouchEnd);
        });
    }

    showRanking() {
        if (this.isAnonymous) { this.toast.show("匿名无排名", 'info'); return; }
        this.trimRankData();
        const diff = this.dom.difficultySelect.value;
        const players = this.rankData[diff] || {};
        const entries = Object.entries(players).sort((a, b) => b[1].bestScore - a[1].bestScore).slice(0, 50);
        let html = `<div class="modal-content"><h3>🏅 ${diff} 排行榜</h3>`;
        entries.forEach(([name, d], i) => { html += `<div class="rank-item"><span>${i+1}</span><span>${name}</span><span>${d.bestScore}</span><span>${this.formatTime(d.bestTime)}</span></div>`; });
        html += `<button onclick="this.closest('.modal').remove()">关闭</button></div>`;
        const modal = document.createElement('div'); modal.className = 'modal'; modal.innerHTML = html;
        document.body.appendChild(modal);
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
    }

    initPlayer() {
        const saved = localStorage.getItem("sudoku_player_name");
        if (saved) { this.currentPlayerName = saved; this.isAnonymous = false; return; }
        const modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content" style="text-align:center;max-width:280px;"><div style="font-size:40px;margin-bottom:8px;">🧩</div><h3>欢迎来挑战数独</h3><p style="color:#64748b;">输入名字记录排名，或匿名游玩</p><input id="playerNameInput" type="text" maxlength="16" placeholder="你的名字" style="width:100%;padding:10px;border-radius:40px;border:2px solid #e2e8f0;text-align:center;margin-bottom:14px;"><div style="display:flex;gap:8px;"><button style="background:#f1f5f9;" id="anonBtn">匿名</button><button class="primary-btn" id="confirmBtn">确认</button></div></div>`;
        document.body.appendChild(modal);
        const input = modal.querySelector('#playerNameInput'); input.focus();
        const submit = () => { const name = input.value.trim(); if (name) { this.currentPlayerName = name; this.isAnonymous = false; localStorage.setItem("sudoku_player_name", name); } else { this.isAnonymous = true; } modal.remove(); };
        modal.querySelector('#confirmBtn').addEventListener('click', submit);
        modal.querySelector('#anonBtn').addEventListener('click', () => { this.isAnonymous = true; modal.remove(); });
        input.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
    }

    toggleNoteMode(force = null) { this.isNoteMode = force !== null ? force : !this.isNoteMode; this.dom.noteModeBtn.classList.toggle('active', this.isNoteMode); this.dom.noteModeIndicator.classList.toggle('active', this.isNoteMode); }

    bindEvents() {
        this.dom.noteModeBtn.addEventListener('click', () => this.toggleNoteMode());
        this.dom.solveBtn.addEventListener('click', () => this.solveCurrent());
        this.dom.resetBtn.addEventListener('click', () => this.resetToPuzzle());
        this.dom.generateBtn.addEventListener('click', () => this.generateAndLoad());
        this.dom.hardestBtn.addEventListener('click', () => this.loadHardestSudoku());
        this.dom.undoBtn.addEventListener('click', () => this.undo());
        this.dom.redoBtn.addEventListener('click', () => this.redo());
        this.dom.pauseBtn.addEventListener('click', () => this.pauseTimer());
        this.dom.deleteBtn.addEventListener('click', () => this.deleteSelectedCell());
        
        let pressTimer = null;
        const longPressDuration = 500;
        const startPress = (e) => {
            if (this.isGameFinished || this.isPaused || this.checkBlockInteraction()) return;
            if (this.usedSolve) return;
            if (this.hintCount >= CONSTANTS.MAX_HINTS) { this.toast.show("提示次数已用完", 'error'); return; }
            this.dom.hintBtn.classList.add('pressing');
            pressTimer = setTimeout(() => { this.showHintMenu(); pressTimer = null; this.dom.hintBtn.classList.remove('pressing'); }, longPressDuration);
        };
        const cancelPress = () => {
            if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
            this.dom.hintBtn.classList.remove('pressing');
        };
        const handleClick = (e) => {
            if (pressTimer === null) return;
            cancelPress();
            this.giveHint();
        };
        this.dom.hintBtn.addEventListener('mousedown', startPress);
        this.dom.hintBtn.addEventListener('mouseup', handleClick);
        this.dom.hintBtn.addEventListener('mouseleave', cancelPress);
        this.dom.hintBtn.addEventListener('touchstart', startPress, { passive: true });
        this.dom.hintBtn.addEventListener('touchend', (e) => { e.preventDefault(); handleClick(e); });
        this.dom.hintBtn.addEventListener('touchcancel', cancelPress);
        
        this.dom.rankBtn.addEventListener('click', () => this.showRanking());
        this.initTooltips();
        
        document.addEventListener('keydown', e => {
            if (this.isGameFinished || this.isPaused || this.isHintModalOpen) return;
            if (e.key >= '1' && e.key <= '9') { this.fillSelectedCell(parseInt(e.key)); e.preventDefault(); }
            else if (e.key === 'Backspace' || e.key === 'Delete') { this.deleteSelectedCell(); e.preventDefault(); }
            else if (e.ctrlKey && e.key === 'z') { this.undo(); e.preventDefault(); }
            else if (e.ctrlKey && e.key === 'y') { this.redo(); e.preventDefault(); }
            else if (['ArrowUp', 'w'].includes(e.key)) { e.preventDefault(); let r = (this.selectedRow === -1 ? 4 : this.selectedRow) - 1; if (r < 0) r = 8; this.selectCell(r, this.selectedCol === -1 ? 4 : this.selectedCol); }
            else if (['ArrowDown', 's'].includes(e.key)) { e.preventDefault(); let r = (this.selectedRow === -1 ? 4 : this.selectedRow) + 1; if (r > 8) r = 0; this.selectCell(r, this.selectedCol === -1 ? 4 : this.selectedCol); }
            else if (['ArrowLeft', 'a'].includes(e.key)) { e.preventDefault(); let c = (this.selectedCol === -1 ? 4 : this.selectedCol) - 1; if (c < 0) c = 8; this.selectCell(this.selectedRow === -1 ? 4 : this.selectedRow, c); }
            else if (['ArrowRight', 'd'].includes(e.key)) { e.preventDefault(); let c = (this.selectedCol === -1 ? 4 : this.selectedCol) + 1; if (c > 8) c = 0; this.selectCell(this.selectedRow === -1 ? 4 : this.selectedRow, c); }
        });
    }
}

// ---------- 启动 ----------
window.addEventListener('load', () => {
    const game = new SudokuGame();
    const saved = localStorage.getItem("sudoku_progress");
    if (saved) {
        try {
            const prog = JSON.parse(saved);
            if (prog.timestamp && Date.now() - prog.timestamp < 24 * 60 * 60 * 1000) {
                const modal = document.createElement('div'); modal.className = 'modal';
                modal.style.cssText = 'justify-content:center;padding-right:0;background:rgba(0,0,0,0.3);';
                modal.innerHTML = `<div class="modal-content" style="text-align:center;max-width:280px;"><div style="font-size:40px;margin-bottom:8px;">💾</div><h3 style="margin:0 0 8px;">发现未完成的进度</h3><p style="color:#64748b;font-size:13px;margin:0 0 20px;">是否继续上次的对局？</p><div style="display:flex;gap:10px;justify-content:center;"><button style="background:#f1f5f9;" id="progressDiscard">新开一局</button><button class="primary-btn" id="progressRestore">继续</button></div></div>`;
                document.body.appendChild(modal);
                modal.querySelector('#progressRestore').addEventListener('click', () => { modal.remove(); game.loadProgress(prog); });
                modal.querySelector('#progressDiscard').addEventListener('click', () => { modal.remove(); game.generateAndLoad(); });
                return;
            }
        } catch (e) {}
    }
    game.generateAndLoad();
});

})();
</script>
